<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Multiplicar</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

<div class="contenedor">

    <!-- Encabezado -->
    <header class="encabezado">
        <img src="LOGOHORIZONTAL.png" alt="JessiDev Logo" class="logo">
        <h2 class="titulo-logo">Aprendiendo Matemáticas</h2>
    </header>

    <!-- Instrucciones -->
    <div class="instrucciones">
        <p><strong>¿Cómo usar?</strong></p>
        <ol>
            <li>Ingrese un número</li>
            <li>Presione el botón</li>
            <li>Revise la tabla generada</li>
        </ol>
    </div>

    <!-- Input -->
    <div class="grupo-input">
        <label for="numero">Número</label>
        <input type="number" id="numero" placeholder="Ej: 5">
    </div>

    <!-- Botón -->
    <button class="btn" onclick="generarTablas();">
        GENERAR TABLA
    </button>

    <h1>Tabla de Multiplicar</h1>

    <!-- Resultado -->
    <section id="idcontenedor"></section>

</div>

</body>
</html>
